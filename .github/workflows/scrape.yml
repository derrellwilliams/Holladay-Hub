name: Scrape Meeting Minutes

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC = midnight MT
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pdfplumber requests beautifulsoup4

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ONESUITE_URL: ${{ secrets.ONESUITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scraper.py --recent

      - name: Commit and push if DB changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meeting_summaries.db
          if git diff --staged --quiet; then
            echo "No new meetings found, skipping commit."
          else
            git commit -m "Update meeting summaries [skip ci]"
            git push
          fi
